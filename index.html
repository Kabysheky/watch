<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kash Watch Vault | Engineering & Horology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fbbf24; --bg: #030303; --lume: #00ffff; --slate: #1e293b; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #e2e8f0; overflow-x: hidden; margin: 0; }
        .lux-font { font-family: 'Playfair Display', serif; }
        .mono-font { font-family: 'Space Grotesk', sans-serif; }
        
        .magnetic-wrap { display: inline-block; transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1); }
        
        #blueprint-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.15; pointer-events: none; }
        .grid-line { stroke: rgba(255,255,255,0.1); stroke-width: 0.5; }

        #gear-system { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.08; pointer-events: none; }
        .gear-path { fill: none; stroke: white; stroke-width: 0.5; stroke-dasharray: 4 4; }
        
        body.lume-mode { background: #000; color: var(--lume); }
        body.lume-mode .glass-card { background: rgba(0, 255, 255, 0.02); border-color: rgba(0, 255, 255, 0.2); box-shadow: 0 0 20px rgba(0,255,255,0.05); }
        body.lume-mode .watch-img { filter: brightness(0.8) drop-shadow(0 0 15px var(--lume)); mix-blend-mode: screen; }
        body.lume-mode .text-yellow-500 { color: var(--lume) !important; text-shadow: 0 0 10px var(--lume); }

        #uv-torch { 
            position: fixed; top: 0; left: 0; width: 400px; height: 400px; 
            background: radial-gradient(circle, rgba(0, 255, 255, 0.12) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none; z-index: 999; display: none; transform: translate(-50%, -50%);
        }
        body.lume-mode #uv-torch { display: block; }

        .glass-card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.07); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .category-tag { font-size: 8px; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 800; background: rgba(255,255,255,0.03); }
        .tag-integrated-sports { color: #22d3ee; border: 1px solid #22d3ee44; }
        .tag-dress { color: #a78bfa; border: 1px solid #a78bfa44; }
        .tag-rugged { color: #f87171; border: 1px solid #f8717144; }
        .tag-digital-classic { color: #fbbf24; border: 1px solid #fbbf2444; }

        .img-container { height: 280px; perspective: 1200px; cursor: crosshair; }
        .watch-img { transition: filter 0.5s ease; max-height: 95%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7)); }

        .beat-bar { width: 3px; background: linear-gradient(to top, var(--gold), transparent); border-radius: 2px; height: 4px; }
        .stat-progress { background: linear-gradient(90deg, var(--gold), #f59e0b); }

        /* PALETTE UI */
        .swatch-pip { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        .swatch-large { width: 36px; height: 36px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="pb-20">

    <div id="uv-torch"></div>

    <svg id="blueprint-bg">
        <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
            <path d="M 100 0 L 0 0 0 100" fill="none" class="grid-line"/>
            <circle cx="0" cy="0" r="1" fill="rgba(255,255,255,0.2)"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#grid)" />
    </svg>

    <svg id="gear-system" viewBox="0 0 100 100">
        <g id="gear-main" transform="translate(50, 50)"><circle class="gear-path" r="20"/></g>
        <g id="gear-balance" transform="translate(85, 15)"><circle class="gear-path" r="12" /><line class="gear-path" x1="-12" y1="0" x2="12" y2="0" /></g>
    </svg>

    <nav class="sticky top-0 z-50 px-10 py-6 bg-black/60 backdrop-blur-2xl border-b border-white/5 flex flex-col lg:flex-row justify-between items-center gap-8">
        <div class="flex flex-col group cursor-default">
            <h1 class="lux-font text-5xl tracking-tighter text-yellow-500 leading-none transition-transform group-hover:scale-105">KASH</h1>
            <span class="text-[9px] uppercase tracking-[0.6em] text-white/30 mt-2 font-black">Technical Archive v2.0</span>
        </div>
        <div class="flex flex-col md:flex-row items-center gap-6">
            <button class="magnetic-wrap bg-white/5 border border-white/10 text-[9px] tracking-[3px] py-2 px-8 rounded-full hover:bg-white/10 hover:border-yellow-500 transition-all" onclick="toggleLume()">LUME MODE</button>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="LOCATE CALIBER..." class="bg-white/5 border border-white/10 px-8 py-2 rounded-full text-xs w-72 mono-font outline-none focus:ring-1 focus:ring-yellow-500/50 transition-all" oninput="handleSearch()">
            </div>
            <div class="flex gap-3 text-[10px] mono-font">
                <button class="magnetic-wrap px-4 py-2 rounded-full border border-white/10 hover:text-yellow-500" onclick="filterWatches('All')">TOTAL</button>
                <button class="magnetic-wrap px-4 py-2 rounded-full border border-white/10 hover:text-yellow-500" onclick="filterWatches('Automatic')">MECHANICAL</button>
                <button class="magnetic-wrap px-4 py-2 rounded-full border border-white/10 hover:text-yellow-500" onclick="filterWatches('Quartz')">ELECTRONIC</button>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-16 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
        <div class="p-8 rounded-3xl glass-card border-t-2 border-t-yellow-500/50">
            <p class="text-[9px] uppercase opacity-40 tracking-widest mb-2 font-black">Capital Asset Value</p>
            <h3 class="text-3xl font-bold mono-font text-yellow-500" id="val-counter">0</h3>
        </div>

        <div class="p-8 rounded-3xl glass-card">
            <p class="text-[9px] uppercase opacity-40 font-black mb-2">Atomic Precision</p>
            <div class="flex items-baseline gap-1">
                <h3 class="text-3xl font-bold mono-font text-white" id="real-time-clock">00:00:00</h3>
                <span class="text-yellow-500 text-xs mono-font" id="clock-ms">.00</span>
            </div>
            <p id="clock-date" class="text-[9px] opacity-30 mt-3 uppercase tracking-widest font-bold">CALIBRATING...</p>
        </div>

        <div class="p-8 rounded-3xl glass-card flex items-center gap-5">
            <div class="relative w-14 h-14 bg-gradient-to-b from-[#0f172a] to-black rounded-full p-[1px]">
                <div class="w-full h-full rounded-full bg-black relative overflow-hidden border border-white/10">
                    <div id="moon-disk" class="absolute inset-0 flex items-center justify-center">
                        <div class="w-10 h-10 bg-gradient-to-tr from-yellow-100 to-yellow-500 rounded-full shadow-[0_0_20px_rgba(251,191,36,0.3)]"></div>
                    </div>
                    <div id="moon-mask" class="absolute inset-0 bg-black translate-x-0 transition-transform duration-[2000ms]"></div>
                </div>
            </div>
            <div>
                <p class="text-[9px] uppercase opacity-40 font-black mb-1">Lunar Cycle</p>
                <p id="moon-label" class="text-xs mono-font font-bold">FETCHING...</p>
            </div>
        </div>

        <div class="p-8 rounded-3xl glass-card">
            <p class="text-[9px] uppercase opacity-40 font-black mb-4">Frequency Oscillation</p>
            <div class="flex items-end gap-1.5 h-10" id="beat-visualizer"></div>
        </div>

        <div class="p-8 rounded-3xl glass-card">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[9px] uppercase opacity-40 font-black">Swiss Lineage</p>
                <span id="swiss-perc" class="text-[10px] mono-font font-bold">0%</span>
            </div>
            <div class="h-2 bg-white/5 rounded-full overflow-hidden">
                <div id="swiss-bar" class="stat-progress h-full w-0"></div>
            </div>
            <p class="text-[9px] opacity-30 mt-3 uppercase font-bold" id="asset-count">0 UNITS</p>
        </div>
    </header>

    <main id="watch-grid" class="max-w-7xl mx-auto px-6 py-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></main>

    <div id="modal-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/95 backdrop-blur-3xl p-6" onclick="closeModal()">
        <div class="max-w-5xl w-full glass-card p-12 rounded-[3rem] grid grid-cols-1 lg:grid-cols-2 gap-16 scale-90 opacity-0" id="modal-content" onclick="event.stopPropagation()">
            <div id="modal-img-frame" class="flex items-center justify-center bg-white/[0.01] rounded-[2rem] p-8 border border-white/5 shadow-inner"></div>
            <div class="flex flex-col justify-center">
                <span id="m-make" class="text-yellow-500 text-[10px] tracking-[0.4em] font-black mb-4 bg-yellow-500/10 px-4 py-1 rounded-full inline-block w-fit"></span>
                <h2 id="m-model" class="lux-font text-5xl mb-6 leading-tight"></h2>
                
                <div class="mb-8 border-y border-white/5 py-6">
                    <p class="text-[9px] opacity-40 font-bold mb-4 tracking-widest uppercase">Sartorial Pairing</p>
                    <div id="m-palette-dots" class="flex gap-5"></div>
                </div>

                <div class="grid grid-cols-2 gap-8 mb-8">
                    <div class="border-l border-white/10 pl-4"><span class="text-[9px] opacity-40 block mb-1 font-bold">CALIBER</span><p id="m-mov" class="text-sm mono-font"></p></div>
                    <div class="border-l border-white/10 pl-4"><span class="text-[9px] opacity-40 block mb-1 font-bold">DEPTH RATING</span><p id="m-wr" class="text-sm mono-font"></p></div>
                </div>
                <div class="bg-white/[0.03] p-6 rounded-2xl border border-white/5">
                    <p class="text-[9px] opacity-40 font-bold mb-2 tracking-widest uppercase">Technical Log</p>
                    <p id="m-egg" class="text-sm italic text-white/80 leading-relaxed"></p>
                </div>
                <button onclick="closeModal()" class="mt-10 py-4 rounded-xl border border-white/10 text-[10px] tracking-[0.3em] font-bold hover:bg-white hover:text-black transition-all">BACK TO VAULT</button>
            </div>
        </div>
    </div>

    <script>
        const watches = [
            { make: "Tissot", model: "PRX Powermatic 80", code: "T137.407.11.041.00", cat: "Integrated Sports", mov: "Automatic (Powermatic 80)", wr: "100m (10 Bar)", comp: "Date, 80hr Reserve", value: "255000", egg: "Nivachron™ Spring: Highly anti-magnetic.", img: "prxp.png", swiss: true, palette: ["#0f172a", "#cbd5e1", "#b91c1c"] },
            { make: "Tissot", model: "PRX Quartz (Mint)", code: "T137.410.11.091.01", cat: "Integrated Sports", mov: "Quartz (ETA F06.115)", wr: "100m (10 Bar)", comp: "Date", value: "137000", egg: "Quick-Release: Swap bracelet for strap in seconds.", img: "prxm.png", swiss: true, palette: ["#f8fafc", "#94a3b8", "#10b981"] },
            { make: "Tissot", model: "PRX Quartz (Blue)", code: "T137.410.11.041.00", cat: "Integrated Sports", mov: "Quartz (ETA F06.115)", wr: "100m (10 Bar)", comp: "Date", value: "137000", egg: "70s Heritage: Direct reissue of the 1978 original.", img: "prxb.png", swiss: true, palette: ["#1e293b", "#e2e8f0", "#475569"] },
            { make: "Tissot", model: "Carson Premium Moonphase", code: "T122.423.11.033.00", cat: "Dress", mov: "Quartz (ETA F05.841)", wr: "50m (5 Bar)", comp: "True Moonphase, Date", value: "165000", egg: "EOL Indicator: Seconds hand jumps 4s when low.", img: "carson.png", swiss: true, palette: ["#000000", "#475569", "#fbbf24"] },            
            { make: "Tag Heuer", model: "Formula 1 Date", code: "WAZ1118.BA0875", cat: "Sports/Racing", mov: "Quartz", wr: "200m (20 Bar)", comp: "Date", value: "425000", egg: "Racing Extension: Clasp has a hidden fold-out.", img: "tag.png", swiss: true, palette: ["#1e293b", "#ef4444", "#ffffff"] },
            { make: "Seiko", model: "5 'Specialist'", code: "SRPD76", cat: "Sports/Diver", mov: "Automatic (4R36)", wr: "100m (10 Bar)", comp: "Day, Date, Hacking", value: "141000", egg: "Hacking Seconds: Stop time for exact sync.", img: "76.png", swiss: false, palette: ["#1e1b4b", "#c2410c", "#525252"] },
            { make: "Seiko", model: "5 'Arabic Dial'", code: "SNK063J5", cat: "Dress/Cult", mov: "Automatic (7S26)", wr: "30m (3 Bar)", comp: "Bilingual Day/Date", value: "85000", egg: "Secret Calendar: Arabic day wheel hidden.", img: "arabic.png", swiss: false, palette: ["#ffffff", "#4b5563", "#fbbf24"] },
            { make: "G-Shock", model: "CasiOak", code: "GA2100", cat: "Rugged", mov: "Quartz (Digi-Ana)", wr: "100m (10 Bar)", comp: "World Time, 5 Alarms", value: "48000", egg: "Hand Shift: Move hands away from digital screen.", img: "casioak.png", swiss: false, palette: ["#1e293b", "#334155", "#000000"] },
            { make: "G-Shock", model: "Camo XL", code: "GA100CM-8A", cat: "Rugged", mov: "Quartz (Digi-Ana)", wr: "200m (20 Bar)", comp: "Speed Indicator", value: "52000", egg: "Mach Indicator: Center dial calculates speed.", img: "gshock.png", swiss: false, palette: ["#454739", "#27272a", "#71717a"] },
            { make: "Casio", model: "Vintage (Black/Gold)", code: "A168WEGB-1B", cat: "Digital Classic", mov: "Quartz", wr: "Splash Proof", comp: "Alarm, Stopwatch", value: "19500", egg: "Authenticity Check: Hold bottom-right for 'CASIo'.", img: "goldv.png", swiss: false, palette: ["#000000", "#fbbf24", "#3f3f46"] },
            { make: "Casio", model: "Vintage (Gunmetal)", code: "A168WGG-1B", cat: "Digital Classic", mov: "Quartz", wr: "Splash Proof", comp: "Alarm, Stopwatch", value: "18000", egg: "LCD Test: Hold all buttons to light segments.", img: "greyv.png", swiss: false, palette: ["#27272a", "#e2e8f0", "#000000"] },
            { make: "Casio", model: "Edifice Chronograph", code: "EFV-500L-7AVUEF", cat: "Sports/Casual", mov: "Quartz", wr: "100m (10 Bar)", comp: "Chrono, 24hr Subdial, Date", value: "35000", egg: "24hr Sync: Prevents damage in 'danger zone'.", img: "edifice.png", swiss: false, palette: ["#7c2d12", "#fef3c7", "#1e293b"] },
            { make: "Fossil", model: "Goodwin Chronograph", code: "FS5415", cat: "Casual/Racing", mov: "Quartz", wr: "50m (5 Bar)", comp: "Flyback Chrono, Date", value: "28000", egg: "Tachymeter: Speed calculation on dial.", img: "goodwin.png", swiss: false, palette: ["#000000", "#e2e8f0", "#991b1b"] },
            { make: "Fossil", model: "Slimline Minimalist", code: "FS5305", cat: "Casual", mov: "Quartz", wr: "50m (5 Bar)", comp: "Three-Hand, Date", value: "22000", egg: "Ultra-Slim: Slide under dress shirt cuffs.", img: "slimline.png", swiss: false, palette: ["#ffffff", "#1e293b", "#d4d4d8"] }
        ];

        gsap.to("#gear-main", { rotation: 360, duration: 25, repeat: -1, ease: "none" });
        gsap.to("#gear-balance", { rotation: 40, duration: 0.12, repeat: -1, yoyo: true, ease: "power1.inOut" });

        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            gsap.to("#blueprint-bg", { x: x * 0.5, y: y * 0.5, duration: 1, ease: "power2.out" });
            gsap.to("#gear-system", { x: -x, y: -y, duration: 1.5, ease: "power3.out" });
            
            document.querySelectorAll('.magnetic-wrap').forEach(btn => {
                const rect = btn.getBoundingClientRect();
                const btnX = e.clientX - (rect.left + rect.width/2);
                const btnY = e.clientY - (rect.top + rect.height/2);
                if(Math.abs(btnX) < 50 && Math.abs(btnY) < 50) {
                    gsap.to(btn, { x: btnX * 0.3, y: btnY * 0.3, duration: 0.3 });
                } else {
                    gsap.to(btn, { x: 0, y: 0, duration: 0.5 });
                }
            });

            if (document.body.classList.contains('lume-mode')) {
                gsap.to("#uv-torch", { left: e.clientX, top: e.clientY, duration: 0.1 });
            }
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('real-time-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('clock-ms').innerText = "." + String(Math.floor(now.getMilliseconds()/10)).padStart(2,'0');
            document.getElementById('clock-date').innerText = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
            requestAnimationFrame(updateClock);
        }

        function openModal(w) {
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            document.getElementById('m-make').innerText = w.make;
            document.getElementById('m-model').innerText = w.model;
            document.getElementById('m-mov').innerText = w.mov;
            document.getElementById('m-wr').innerText = w.wr;
            document.getElementById('m-egg').innerText = w.egg;
            document.getElementById('modal-img-frame').innerHTML = `<img src="${w.img}" class="max-h-[450px] drop-shadow-2xl" onerror="this.src='https://via.placeholder.com/500?text=${w.model}'">`;
            
            const pDots = document.getElementById('m-palette-dots');
            pDots.innerHTML = w.palette.map(color => `
                <div class="flex flex-col items-center gap-2">
                    <div class="swatch-large shadow-lg" style="background: ${color}"></div>
                    <span class="text-[8px] mono-font opacity-40">${color.toUpperCase()}</span>
                </div>
            `).join('');

            modal.style.display = 'flex';
            gsap.to(modal, { opacity: 1, duration: 0.5 });
            gsap.to(content, { scale: 1, opacity: 1, duration: 0.6, ease: "elastic.out(1, 0.8)" });
        }

        function closeModal() {
            gsap.to("#modal-content", { scale: 0.9, opacity: 0, duration: 0.3 });
            gsap.to("#modal-overlay", { opacity: 0, duration: 0.4, onComplete: () => document.getElementById('modal-overlay').style.display = 'none' });
        }

        function renderWatches(data) {
            const grid = document.getElementById('watch-grid');
            grid.innerHTML = '';
            data.forEach((w, i) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-[2.5rem] p-10 flex flex-col h-full opacity-0 translate-y-20 watch-card overflow-hidden group';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-8 relative z-10">
                        <span class="category-tag tag-${w.cat.toLowerCase().replace('/', '-').replace(' ', '-')}">${w.cat}</span>
                        <div class="w-2 h-2 rounded-full ${w.mov.includes('Automatic') ? 'bg-yellow-500 animate-pulse' : 'bg-white/20'}"></div>
                    </div>
                    <div class="img-container mb-10 relative z-10">
                        <img src="${w.img}" class="watch-img group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://via.placeholder.com/300?text=${w.make}'">
                    </div>
                    <div class="relative z-10 flex flex-col h-full">
                        <h4 class="text-white/20 text-[9px] uppercase font-black tracking-[0.3em] mb-2">${w.make}</h4>
                        <h2 class="lux-font text-3xl mb-4 group-hover:text-yellow-500 transition-colors">${w.model}</h2>
                        
                        <div class="flex gap-2 mb-6">
                            ${w.palette.map(color => `<div class="swatch-pip" style="background: ${color}"></div>`).join('')}
                        </div>

                        <div class="mt-auto pt-8 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[10px] mono-font opacity-40">${w.wr}</span>
                            <div class="text-right">
                                <span class="text-[8px] opacity-20 block mb-1 uppercase">Value</span>
                                <span class="text-yellow-500 mono-font font-black">${parseInt(w.value).toLocaleString()} LKR</span>
                            </div>
                        </div>
                    </div>`;

                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    gsap.to(card, { rotationY: x * 15, rotationX: -y * 15, transformPerspective: 1000, duration: 0.5 });
                });
                
                card.addEventListener('mouseleave', () => {
                    gsap.to(card, { rotationX: 0, rotationY: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
                });

                card.onclick = () => openModal(w);
                grid.appendChild(card);
            });
            updateAnalytics(data);
            gsap.to(".watch-card", { opacity: 1, y: 0, duration: 1.2, stagger: 0.1, ease: "power4.out" });
        }

        function updateAnalytics(data) {
            const total = data.reduce((acc, w) => acc + parseInt(w.value), 0);
            const autoCount = data.filter(w => w.mov.includes('Automatic')).length;
            const swissCount = data.filter(w => w.swiss).length;
            const swissRatio = data.length > 0 ? Math.round((swissCount / data.length) * 100) : 0;
            
            gsap.to("#val-counter", { innerText: total, duration: 2.5, snap: { innerText: 1 }, modifiers: { innerText: (v) => parseInt(v).toLocaleString() + ' LKR' } });
            document.getElementById('asset-count').innerText = `${data.length} ARCHIVED UNITS`;
            document.getElementById('swiss-perc').innerText = `${swissRatio}%`;
            gsap.to("#swiss-bar", { width: `${swissRatio}%`, duration: 2, ease: "expo.out" });

            // Re-sync visualizer speed based on active mechanical count
            const bars = document.querySelectorAll('.beat-bar');
            bars.forEach(bar => {
                gsap.to(bar, { 
                    scaleY: 1 + Math.random() * 8, 
                    duration: autoCount > 0 ? 0.15 : 1.5, 
                    repeat: -1, 
                    yoyo: true, 
                    ease: "sine.inOut" 
                });
            });
        }

        function toggleLume() { document.body.classList.toggle('lume-mode'); }
        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderWatches(watches.filter(w => w.model.toLowerCase().includes(q) || w.make.toLowerCase().includes(q)));
        }
        function filterWatches(f) { renderWatches(f === 'All' ? watches : watches.filter(w => w.mov.includes(f))); }

        window.onload = () => {
            const container = document.getElementById('beat-visualizer');
            for(let i=0; i<20; i++) {
                const bar = document.createElement('div');
                bar.className = 'beat-bar flex-1';
                container.appendChild(bar);
            }
            updateClock();
            renderWatches(watches);
            
            const lp = 2551443; 
            const now = new Date();
            const phase = ((now.getTime() - new Date(1970, 0, 7, 20, 35, 0).getTime()) / 1000) % lp;
            const phasePct = phase / lp;
            document.getElementById('moon-mask').style.transform = `translateX(${(phasePct < 0.5) ? phasePct * 200 : (1 - phasePct) * 200}%)`;
            const phases = ["NEW MOON", "WAXING CRESCENT", "FIRST QUARTER", "WAXING GIBBOUS", "FULL MOON", "WANING GIBBOUS", "LAST QUARTER", "WANING CRESCENT"];
            document.getElementById('moon-label').innerText = phases[Math.floor(phasePct * 8)];
        };
    </script>
</body>
</html>
