<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK's Watch Vault</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My App">
    <link rel="apple-touch-icon" href="iconn.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fbbf24; --bg: #050505; --lume: #00ffff; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #e2e8f0; scroll-behavior: smooth; overflow-x: hidden; }
        .lux-font { font-family: 'Playfair Display', serif; }
        .mono-font { font-family: 'Space Grotesk', sans-serif; }
        
        /* Shutter Loader Styles */
        #loader-wrapper { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .shutter-container { position: absolute; inset: 0; display: flex; pointer-events: none; }
        .shutter-slat { flex: 1; background: #000; height: 100%; border-right: 1px solid rgba(255,255,255,0.02); }
        .loader-content { z-index: 10000; position: relative; }
        .progress-ring__circle { stroke: var(--gold); stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: stroke-dashoffset 0.1s linear; }

        .glass-card { background: var(--glass); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .watch-card-container { perspective: 2000px; height: 620px; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 2.5rem; overflow: hidden; }
        .card-back { transform: rotateY(180deg); background: radial-gradient(circle at center, #111 0%, #050505 100%); border: 1px solid rgba(251, 191, 36, 0.2); }
        
        body.lume-mode { background: #000; }
        body.lume-mode .watch-img { filter: brightness(1.3) drop-shadow(0 0 25px var(--lume)); mix-blend-mode: screen; }
        #uv-torch { position: fixed; width: 450px; height: 450px; background: radial-gradient(circle, rgba(0, 255, 255, 0.12) 0%, rgba(0,0,0,0) 70%); pointer-events: none; z-index: 999; display: none; transform: translate(-50%, -50%); }
        body.lume-mode #uv-torch { display: block; }

        .match-perfect { border: 2px solid var(--gold) !important; box-shadow: 0 0 60px rgba(251, 191, 36, 0.3); transform: translateY(-25px) scale(1.05); z-index: 40; opacity: 1 !important; filter: none !important; }
        .match-suggested { border: 2px solid rgba(255, 255, 255, 0.5) !important; box-shadow: 0 0 40px rgba(255, 255, 255, 0.1); transform: translateY(-15px) scale(1.02); z-index: 30; opacity: 1 !important; filter: none !important; }
        body.has-match .watch-card-container:not(.match-perfect):not(.match-suggested) { opacity: 0.15; filter: grayscale(1) blur(4px); pointer-events: none; }
        
        input[type="color"] { -webkit-appearance: none; border: none; width: 42px; height: 42px; border-radius: 12px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; }
        .gear { fill: none; stroke: var(--gold); stroke-width: 0.5; opacity: 0.4; transform-origin: center; }
        
        .toggle-pill { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 4px; display: flex; gap: 4px; }
        .toggle-btn { font-size: 8px; font-weight: 900; letter-spacing: 0.1em; padding: 6px 16px; border-radius: 999px; transition: all 0.3s ease; color: rgba(255,255,255,0.4); }
        .toggle-btn.active { background: var(--gold); color: black; }
    </style>
</head>
<body class="pb-20">

    <div id="loader-wrapper">
        <div class="shutter-container">
            <div class="shutter-slat"></div>
            <div class="shutter-slat"></div>
            <div class="shutter-slat"></div>
            <div class="shutter-slat"></div>
            <div class="shutter-slat"></div>
            <div class="shutter-slat"></div>
        </div>
        <div class="loader-content">
            <svg class="w-64 h-64 -rotate-90" viewBox="0 0 200 200">
                <circle class="text-white/5" stroke="currentColor" stroke-width="1" fill="transparent" r="90" cx="100" cy="100"/>
                <circle class="progress-ring__circle" id="loading-circle" stroke-width="1.5" fill="transparent" r="90" cx="100" cy="100"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                <h2 class="lux-font text-2xl tracking-[0.2em] text-yellow-500 mb-1">KK'S VAULT</h2>
                <p class="mono-font text-[7px] text-white/30 tracking-[0.5em] uppercase" id="load-perc">CALIBRATING 0%</p>
            </div>
        </div>
    </div>

    <div id="uv-torch"></div>
    <nav class="sticky top-0 z-50 px-8 py-5 bg-black/90 backdrop-blur-2xl border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-baseline gap-4">
            <h1 class="lux-font text-4xl tracking-tighter text-yellow-500 uppercase">Kabyshek's </h1>
            <span class="text-[7px] uppercase tracking-[0.8em] text-white/20 font-extrabold">Vault Caliber</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="bg-white/5 border border-white/10 text-[8px] tracking-[2px] py-2 px-6 rounded-lg hover:bg-yellow-500 hover:text-black transition-all" onclick="toggleLume()">LUME MODE</button>
            <input type="text" id="searchInput" placeholder="SEARCH VAULT..." class="bg-white/5 border border-white/10 px-6 py-2 rounded-lg text-[10px] w-48 mono-font outline-none focus:border-yellow-500/50" oninput="handleSearch()">
            <button class="bg-red-500/10 border border-red-500/20 text-red-500 text-[8px] tracking-[2px] py-2 px-4 rounded-lg hidden" id="clearBtn" onclick="resetView()">RESET VIEW</button>
        </div>
    </nav>

    <header class="max-w-[1400px] mx-auto px-8 pt-10 grid grid-cols-1 md:grid-cols-12 gap-6">
        <div class="md:col-span-5 p-8 rounded-[2.5rem] glass-card border-t-2 border-t-yellow-500/30">
            <div class="flex justify-between items-center mb-6">
                <p class="text-[8px] uppercase opacity-40 font-black tracking-[0.3em]">Style Engine Optimization</p>
                <div class="toggle-pill">
                    <button id="mode-min" class="toggle-btn active" onclick="setMode('minimalist')">MINIMALIST</button>

                </div>

            </div>
            <div class="flex items-center gap-8 justify-center">
                <div class="flex gap-4">
                    <div class="text-center"><input type="color" id="topColor" value="#ffffff"><p class="text-[7px] font-black mt-2 opacity-30">TOP</p></div>
                    <div class="text-center"><input type="color" id="bottomColor" value="#1a1a1a"><p class="text-[7px] font-black mt-2 opacity-30">BOTTOM</p></div>
                </div>

                <div class="flex-1 text-center">
                    <button onclick="findMatches()" class="w-full py-4 rounded-xl bg-yellow-500 text-black text-[9px] font-black uppercase tracking-[0.2em] shadow-xl hover:scale-105 transition-all active:scale-95">Scan Collection</button>

                </div>
            </div>
        </div>
        <div class="md:col-span-3 p-8 rounded-[2.5rem] glass-card flex flex-col justify-center text-center">

            <h3 class="text-3xl font-bold mono-font text-yellow-500" id="val-counter">0 LKR</h3>
            <p class="text-[9px] text-green-400 mt-2 font-bold tracking-widest" id="roi-stat">---</p>
        </div>
        <div class="md:col-span-4 p-8 rounded-[2.5rem] glass-card flex justify-between items-center">
            <div class="flex items-center gap-4"><div class="relative w-12 h-12 bg-black rounded-full border border-white/10 overflow-hidden"><div id="moon-disk" class="absolute inset-0 flex items-center justify-center"><div class="w-8 h-8 bg-gradient-to-tr from-yellow-100 to-yellow-500 rounded-full blur-[1px]"></div></div><div id="moon-mask" class="absolute inset-0 bg-black translate-x-0 transition-transform duration-1000"></div></div><div><p class="text-[7px] opacity-40 font-black tracking-widest uppercase">Moonphase</p><p id="moon-label" class="text-[10px] font-bold mono-font">---</p></div></div>
            <div class="text-right"><h3 class="text-3xl font-bold mono-font leading-none mb-1" id="real-time-clock">00:00:00</h3><p id="clock-date" class="text-[8px] opacity-30 font-black uppercase tracking-[0.2em]">---</p></div>
        </div>
    </header>

    <main id="watch-grid" class="max-w-[1400px] mx-auto px-8 py-16 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></main>

    <div id="modal-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/95 backdrop-blur-3xl p-6" onclick="closeModal()">
        <div class="max-w-7xl w-full glass-card p-10 md:p-14 rounded-[4rem] grid grid-cols-1 lg:grid-cols-12 gap-12 scale-95 opacity-0 transition-all duration-500 max-h-[90vh] overflow-y-auto" id="modal-content" onclick="event.stopPropagation()">
            <div class="lg:col-span-6 flex items-center justify-center bg-white/[0.02] rounded-[3rem] p-10 border border-white/5"><div id="modal-img-frame"></div></div>
            <div class="lg:col-span-6 flex flex-col justify-center">

                    <div class="p-4 bg-white/5 rounded-2xl border border-white/5"><span class="text-[7px] opacity-40 block mb-1 uppercase font-black tracking-widest">Resistance</span><p id="m-wr" class="text-xs font-bold"></p></div>
                </div>
                <div class="space-y-6 mb-10">
                    <div><h4 class="text-[8px] text-yellow-500/50 font-black uppercase tracking-[0.3em] mb-2">Technical Functions</h4><p id="m-comp" class="text-sm text-white/70 leading-relaxed"></p></div>
                    <div><h4 class="text-[8px] text-yellow-500/50 font-black uppercase tracking-[0.3em] mb-2">Quirks & Details</h4><p id="m-egg" class="text-sm italic text-yellow-500/80 leading-relaxed"></p></div>
                </div>
                <div class="pt-8 border-t border-white/5 grid grid-cols-2 gap-4">
                    <div><span class="text-[8px] opacity-30 block mb-1 font-black uppercase tracking-widest">Value</span><p id="m-val" class="text-2xl mono-font font-bold"></p></div>
                    <div class="text-right"><span class="text-[8px] opacity-30 block mb-1 font-black uppercase tracking-widest">Paid</span><p id="m-bought" class="text-2xl mono-font text-white/40"></p></div>
                </div>
                <button onclick="closeModal()" class="mt-10 py-5 rounded-2xl border border-white/10 text-[9px] font-black uppercase tracking-[0.6em] hover:bg-white hover:text-black transition-all">Exit Archive</button>
            </div>
        </div>
    </div>

<script>
    const watches = [
        { id: 0, make: "Tissot", model: "PRX Powermatic 80", ref: "T137.407.11.041.00", cat: "Integrated Sports", mov: "Automatic (ETA C07.111)", wr: "100m", comp: "Instantaneous Date, 80-Hour Reserve, Hacking Seconds", bought: 235000, value: 255000, egg: "Waffle dial and Nivachron™ anti-magnetic spring.", img: "prxp.png", palette: ["#0f172a", "#cbd5e1", "#b91c1c"] },

        { id: 2, make: "Tissot", model: "PRX Quartz (Blue)", ref: "T137.410.11.041.00", cat: "Integrated Sports", mov: "Quartz", wr: "100m", comp: "Sunray Blue Dial, Date", bought: 130000, value: 137000, egg: "Iconic integrated bracelet design from 1978.", img: "prxb.png", palette: ["#1e293b", "#e2e8f0", "#475569"] },
        { id: 3, make: "Tissot", model: "Carson Moonphase", ref: "T122.423.11.033.00", cat: "Dress", mov: "Quartz (Renata 394)", wr: "50m", comp: "Moonphase Complication, Roman Numerals", bought: 155000, value: 165000, egg: "Features a poetic lunar cycle on a silver leaf dial.", img: "carson.png", palette: ["#000000", "#475569", "#fbbf24"] },
        { id: 4, make: "Tag Heuer", model: "Formula 1 Date", ref: "WAZ1110.BA0875", cat: "Racing", mov: "Quartz", wr: "200m", comp: "Screw-down Crown, Unidirectional Bezel", bought: 380000, value: 425000, egg: "Professional diving specs combined with racing DNA.", img: "tag.png", palette: ["#1e293b", "#ef4444", "#ffffff"] },
        { id: 5, make: "Seiko", model: "5 'Specialist'", ref: "SRPD55K1", cat: "Sports/Diver", mov: "Automatic (4R36)", wr: "100m", comp: "Day/Date, Manual Winding, Hacking", bought: 125000, value: 141000, egg: "Robust 4R36 movement visible through the caseback.", img: "76.png", palette: ["#1e1b4b", "#c2410c", "#525252"] },
        { id: 6, make: "Seiko", model: "5 'Arabic Dial'", ref: "SNKP21J1", cat: "Dress/Cult", mov: "Automatic (7S26)", wr: "30m", comp: "Eastern Arabic Numerals, Day/Date", bought: 65000, value: 85000, egg: "A rare regional masterpiece with huge cult status.", img: "arabic.png", palette: ["#ffffff", "#4b5563", "#fbbf24"] },
        { id: 7, make: "G-Shock", model: "CasiOak", ref: "GA-2100-1A1", cat: "Rugged", mov: "Module 5611", wr: "200m", comp: "Carbon Core Guard, World Time, Alarms", bought: 42000, value: 48000, egg: "Modern legend with a slim, octagonal profile.", img: "casioak.png", palette: ["#1e293b", "#334155", "#000000"] },
        { id: 8, make: "G-Shock", model: "Camo XL", ref: "GA-100MM", cat: "Rugged", mov: "Quartz", wr: "200m", comp: "Speed Indicator, 1/1000 sec Chrono", bought: 48000, value: 52000, egg: "Magnetic resistant structure with XL presence.", img: "gshock.png", palette: ["#454739", "#27272a", "#71717a"] },
        { id: 9, make: "Casio", model: "Vintage (Black/Gold)", ref: "A168WG-9", cat: "Digital", mov: "Module 3298", wr: "Water Resistant", comp: "EL Backlight, Stopwatch", bought: 15000, value: 19500, egg: "The absolute gold standard of 80s retro-futurism.", img: "goldv.png", palette: ["#000000", "#fbbf24", "#3f3f46"] },
        { id: 10, make: "Casio", model: "Vintage (Gunmetal)", ref: "A168WGG-1B", cat: "Digital", mov: "Module 3298", wr: "Water Resistant", comp: "Negative Display, Stealth Case", bought: 14000, value: 18000, egg: "Ion-plated gunmetal for a modern tactical look.", img: "greyv.png", palette: ["#27272a", "#e2e8f0", "#000000"] },
        { id: 11, make: "Casio", model: "Edifice Chrono", ref: "EFR-556DB", cat: "Casual", mov: "Quartz", wr: "100m", comp: "3-Dial Chronograph, Date Display", bought: 28000, value: 35000, egg: "Motorsport-inspired layered dial depth.", img: "edifice.png", palette: ["#7c2d12", "#fef3c7", "#1e293b"] },
        { id: 12, make: "Fossil", model: "Goodwin Chrono", ref: "FS5412", cat: "Casual", mov: "Quartz", wr: "50m", comp: "Tachymeter, 60-second Chrono", bought: 22000, value: 28000, egg: "Classic racing aesthetics with a domed crystal lens.", img: "goodwin.png", palette: ["#000000", "#e2e8f0", "#991b1b"] },
        { id: 13, make: "Fossil", model: "Minimalist Slim", ref: "FS5305", cat: "Casual", mov: "Quartz", wr: "50m", comp: "Time-only, Ultra-thin Profile", bought: 18000, value: 22000, egg: "Maximum simplicity in a low-profile stainless case.", img: "slimline.png", palette: ["#ffffff", "#1e293b", "#d4d4d8"] }
    ];

    function renderWatches(data) {
        const grid = document.getElementById('watch-grid'); grid.innerHTML = '';
        data.forEach((w) => {
            const isAuto = w.mov.includes('Automatic');
            const card = document.createElement('div');
            card.className = 'watch-card-container'; card.id = `watch-card-${w.id}`;
            card.innerHTML = `
                <div class="card-inner" id="card-${w.id}" onclick="handleCardClick(event, ${w.id})">
                    <div class="card-front glass-card p-10 flex flex-col group">
                        <div class="flex justify-between items-start mb-6">
                            <span class="bg-white/5 border border-white/10 text-[7px] px-3 py-1.5 rounded-lg font-black uppercase tracking-widest">${w.cat}</span>
                            <div class="flex gap-2">${w.palette.map(color => `<div class="w-2.5 h-2.5 rounded-full border border-white/20" style="background:${color}"></div>`).join('')}</div>
                        </div>
                        <div class="flex-1 flex items-center justify-center py-4"><img src="${w.img}" class="watch-img max-h-56 group-hover:scale-110 transition-all duration-1000" onerror="this.src='https://via.placeholder.com/300?text=${w.make}'"></div>
                        <div class="border-t border-white/5 pt-8">
                            <h4 class="text-white/20 text-[8px] uppercase font-black tracking-[0.4em] mb-2">${w.make}</h4>
                            <h2 class="lux-font text-3xl mb-1 text-white/90 leading-tight">${w.model}</h2>
                            <p class="mono-font text-[7px] text-white/20 tracking-widest uppercase mb-4">${w.ref}</p>
                            <div class="flex justify-between items-center text-[8px] mono-font opacity-30 uppercase tracking-widest">
                                <span>${w.mov.split(' ')[0]} / ${w.wr}</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-back glass-card p-12 flex flex-col items-center">
                        <p class="text-yellow-500 text-[8px] font-black tracking-[0.5em] mb-12 uppercase relative z-10">Exhibition Caseback</p>
                        <svg class="w-48 h-48 relative z-10" viewBox="0 0 100 100">
                            <g id="gears-${w.id}"><circle cx="50" cy="50" r="15" class="gear" /><circle cx="35" cy="40" r="8" class="gear" /><circle cx="65" cy="45" r="10" class="gear" /></g>
                            <path id="rotor-${w.id}" d="M 50 50 L 50 15 A 35 35 0 0 1 85 50 Z" fill="rgba(251, 191, 36, 0.15)" stroke="var(--gold)" stroke-width="0.5"/>
                        </svg>
                        <button onclick="flipCard(event, ${w.id})" class="mt-12 text-[7px] font-black border border-white/10 px-8 py-3 rounded-full hover:bg-white hover:text-black transition-all uppercase relative z-10">Return to Dial</button>
                    </div>
                </div>`;
            grid.appendChild(card);
            if(isAuto) {
                gsap.to(`#rotor-${w.id}`, { rotation: 360, duration: 20, repeat: -1, ease: "none" });
                gsap.to(`#gears-${w.id} circle`, { rotation: (i) => i % 2 ? 360 : -360, duration: 12, repeat: -1, ease: "none" });
            }
        });
        updateStats(data);
    }

    function exitShutter() {
        const tl = gsap.timeline();
        tl.to(".loader-content", { duration: 0.5, opacity: 0, y: -20, ease: "power2.in" })
          .to(".shutter-slat", {
            duration: 1,
            height: 0,
            stagger: { each: 0.1, from: "center" },
            ease: "expo.inOut"
          })
          .to("#loader-wrapper", { display: "none" })
          .from(".watch-card-container", {
            duration: 0.8,
            y: 40,
            opacity: 0,
            stagger: 0.05,
            ease: "back.out(1.7)",
            clearProps: "all"
          }, "-=0.5");
    }

    function findMatches() {
        const top = document.getElementById('topColor').value;
        const bottom = document.getElementById('bottomColor').value;
        const mode = document.getElementById('styleMode').value;
        const excludedIds = [8, 9, 11, 13];

        const hexToRgb = h => h.match(/\w\w/g).map(x => parseInt(x, 16));
        const getLuminance = hex => {
            const [r, g, b] = hexToRgb(hex);
            return (0.299 * r + 0.587 * g + 0.114 * b);
        };

        const dist = (c1, c2) => {
            const [r1, g1, b1] = hexToRgb(c1); 
            const [r2, g2, b2] = hexToRgb(c2);
            return Math.sqrt(Math.pow((r1-r2)*0.30, 2) + Math.pow((g1-g2)*0.59, 2) + Math.pow((b1-b2)*0.11, 2));
        };

        let eligible = watches.filter(w => !excludedIds.includes(w.id));
        let scored = eligible.map(w => {
            let dTop = Math.min(...w.palette.map(p => dist(p, top)));
            let dBottom = Math.min(...w.palette.map(p => dist(p, bottom)));
            let lumTop = getLuminance(top);
            let watchLum = getLuminance(w.palette[0]);
            let score = 100;

            if (mode === 'minimalist') {
                score = (dTop * 0.7) + (dBottom * 0.3);
            } else {
                let lumGap = Math.abs(watchLum - lumTop);
                score = 200 - lumGap + (dBottom * 0.1);
                if (w.id === 6 || w.id === 1) score -= 40;
            }
            return { id: w.id, score: score };
        }).sort((a, b) => a.score - b.score);

        resetView();
        document.body.classList.add('has-match');
        document.getElementById('clearBtn').classList.remove('hidden');

        let finalSelection = scored.slice(0, 3);
        const hasBlueQuartz = finalSelection.some(m => m.id === 2);

        if (hasBlueQuartz && !finalSelection.some(m => m.id === 0)) {
            finalSelection.push({ id: 0, score: -1 });
            finalSelection.sort((a, b) => a.score - b.score);
        }

        finalSelection.forEach((m, index) => {
            const el = document.getElementById(`watch-card-${m.id}`);
            if(el) {
                if(index === 0 || (hasBlueQuartz && m.id === 0)) el.classList.add('match-perfect');
                else el.classList.add('match-suggested');
            }
        });

        document.getElementById('match-status').innerText = `LOGIC: ${mode.toUpperCase()} MODE [PRX SYNC]`;
        const targetId = (hasBlueQuartz) ? 0 : finalSelection[0].id;
        document.getElementById(`watch-card-${targetId}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function handleCardClick(e, id) { if(!e.target.closest('button')) openModal(watches.find(w => w.id === id)); }
    function flipCard(e, id) { e.stopPropagation(); document.getElementById(`card-${id}`).classList.toggle('is-flipped'); }
    function setMode(mode) {
        document.getElementById('styleMode').value = mode;
        document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(mode === 'minimalist' ? 'mode-min' : 'mode-con').classList.add('active');
        if(document.body.classList.contains('has-match')) findMatches();
    }
    function resetView() { document.body.classList.remove('has-match'); document.getElementById('clearBtn').classList.add('hidden'); document.querySelectorAll('.watch-card-container').forEach(el => el.classList.remove('match-perfect', 'match-suggested')); document.getElementById('match-status').innerText = "Logic: Perceptual Filter"; }
    function toggleLume() { document.body.classList.toggle('lume-mode'); }
    function handleSearch() { resetView(); const q = document.getElementById('searchInput').value.toLowerCase(); renderWatches(watches.filter(w => w.model.toLowerCase().includes(q) || w.make.toLowerCase().includes(q))); }
    function updateStats(data) { 
        const mkt = data.reduce((a, w) => a + w.value, 0); 
        const bgt = data.reduce((a, w) => a + w.bought, 0); 
        document.getElementById('val-counter').innerText = mkt.toLocaleString() + ' LKR'; 
        document.getElementById('roi-stat').innerText = `Portfolio ROI: +${(((mkt-bgt)/bgt)*100).toFixed(1)}%`; 
    }
    function updateClock() { 
        const now = new Date(); 
        document.getElementById('real-time-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false }); 
        document.getElementById('clock-date').innerText = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase(); 
        requestAnimationFrame(updateClock); 
    }
    function closeModal() { 
        gsap.to("#modal-content", { opacity: 0, scale: 0.95, duration: 0.4, onComplete: () => document.getElementById('modal-overlay').style.display = 'none' }); 
    }
    function openModal(w) { 
        document.getElementById('m-make').innerText = w.make; 
        document.getElementById('m-model').innerText = w.model; 
        document.getElementById('m-ref').innerText = w.ref; 
        document.getElementById('m-mov').innerText = w.mov; 
        document.getElementById('m-wr').innerText = w.wr; 
        document.getElementById('m-comp').innerText = w.comp; 
        document.getElementById('m-egg').innerText = w.egg; 
        document.getElementById('m-val').innerText = w.value.toLocaleString() + ' LKR'; 
        document.getElementById('m-bought').innerText = w.bought.toLocaleString() + ' LKR'; 
        document.getElementById('modal-img-frame').innerHTML = `<img src="${w.img}" class="max-h-[400px] drop-shadow-2xl">`; 
        document.getElementById('modal-overlay').style.display = 'flex'; 
        gsap.to("#modal-content", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.2)" }); 
    }

    window.onload = () => {
        const lp = 2551443; const phase = ((new Date().getTime() - new Date(1970, 0, 7, 20, 35, 0).getTime()) / 1000) % lp;
        document.getElementById('moon-mask').style.transform = `translateX(${(phase/lp < 0.5) ? (phase/lp)*200 : (1-(phase/lp))*200}%)`;
        document.getElementById('moon-label').innerText = ["NEW MOON", "WAXING CRESCENT", "FIRST QUARTER", "WAXING GIBBOUS", "FULL MOON", "WANING GIBBOUS", "LAST QUARTER", "WANING CRESCENT"][Math.floor((phase/lp) * 8)];
        renderWatches(watches); 
        updateClock();

        let progress = 0;
        const circle = document.getElementById('loading-circle');
        const circumference = 2 * Math.PI * 90;
        const percText = document.getElementById('load-perc');

        const loadInterval = setInterval(() => {
            progress += Math.random() * 12;
            if (progress >= 100) {
                progress = 100;
                clearInterval(loadInterval);
                setTimeout(exitShutter, 400);
            }
            circle.style.strokeDashoffset = circumference - (progress / 100 * circumference);
            percText.innerText = `CALIBRATING ${Math.floor(progress)}%`;
        }, 100);
    };

    window.addEventListener('mousemove', (e) => { if (document.body.classList.contains('lume-mode')) gsap.to("#uv-torch", { left: e.clientX, top: e.clientY, duration: 0.1 }); });
</script>
</body>
</html>
